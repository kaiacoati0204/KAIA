<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login KaIA</title>
</head>
<body>
    <!-- CSS -->
    <link rel="stylesheet" href="style.css">
    
    <!-- ================= LOGIN (luz + caixa no mesmo container) ================= -->
    <div class="tela-login">
        <!-- A luz fica ATRÁS da caixa (z-index na .caixa-login), sem cobri-la -->
        <div class="luz-fundo" id="luzFundo"></div>

        <div class="caixa-login">
            <h1>Ka<span>IA</span></h1>
            <p>Inicie sua missão de foco.</p>
            <div class="grupo-input">
                <label>Email</label>
                <input
                    id="login-email"
                    type="email"
                    placeholder="Digite seu email">
            </div>
            <div class="grupo-input">
                <label>Senha</label>
                <input
                    id="login-senha"
                    type="password"
                    placeholder="Digite sua senha"
                >
            </div>
            <a href="hobbies.html" class="botao-login" onclick="salvarLogin(event)">
                Entrar
            </a>
            <span class="body">
                Esqueci a senha
            </span>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
