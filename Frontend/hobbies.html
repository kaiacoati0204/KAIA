<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KaIA | Hobbies</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">

    <script src="./config.js"></script>
    <!-- Proteção de rota: sem login no sessionStorage, volta para o login. -->
    <script>
        const usuario = JSON.parse(sessionStorage.getItem('kaia_usuario') || 'null');
        if (!usuario) window.location.href = 'login.html';
    </script>
</head>

<body>

    <div class="tela-login">
        <div class="caixa-hobbies">
            <h1>Ka<span>IA</span></h1>
            <p>Escolha o que você curte — a KaIA usa isso para criar questões que fazem sentido para você.</p>

            <div class="lista-hobbies">
                <!-- Os botões vêm da constante HOBBIES do script.js -->
                <div class="botoes-hobbies"></div>
            </div>

            <p id="resultado-clique" class="clique"></p>
            <button type="button" class="botao-login" onclick="salvarHobbies()">Começar</button>
        </div>
    </div>

    <script src="js/script.js"></script>
</body>

</html>
