<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KaIA | Login</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">

    <script src="../config.js"></script>
</head>

<body>

    <div class="tela-login">
        <!-- A luz foge do mouse e fica ATRÁS da caixa (ver registrarLuz no script.js) -->
        <div class="luz-fundo" id="luzFundo"></div>

        <form class="caixa-login" onsubmit="salvarLogin(event)">
            <h1>Ka<span>IA</span></h1>
            <p>Inicie sua missão de foco.</p>

            <div class="grupo-input">
                <label for="login-email">Email</label>
                <input id="login-email" type="email" placeholder="Digite seu email" autocomplete="email">
            </div>

            <div class="grupo-input">
                <label for="login-senha">Senha</label>
                <input id="login-senha" type="password" placeholder="Digite sua senha" autocomplete="current-password">
            </div>

            <!-- Preenchido por salvarLogin() quando o e-mail não é encontrado -->
            <p id="login-erro" class="erro-login" role="alert" aria-live="polite"></p>

            <button type="submit" class="botao-login">Entrar</button>
            <span class="link-secundario">Esqueci a senha</span>
        </form>
    </div>

    <script src="../js/script.js"></script>
</body>

</html>
