<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KaIA | Professor/Responsável</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<!-- data-menu: o script.js injeta o botão ☰ e o menu lateral -->
<body data-menu>

    <main class="conteudo">

        <div class="busca">
            <input id="email" type="email" placeholder="E-mail do aluno" autocomplete="off">
            <button type="button" onclick="carregar()">Ver estatísticas</button>
        </div>

        <div id="status"></div>

        <!-- Liberado pelo JS quando o aluno é encontrado -->
        <div id="painel">
            <div class="cards">
                <div class="card">
                    <label>Total de acertos</label>
                    <div class="v" id="m-acertos">–</div>
                </div>
                <div class="card">
                    <label>Dias com estudo</label>
                    <div class="v" id="m-dias">–</div>
                </div>
                <div class="card">
                    <label>Sequência de dias</label>
                    <div class="v" id="m-seq">–</div>
                </div>
                <div class="card">
                    <label>Evolução de acertos</label>
                    <div class="v tag" id="m-tend-acertos">–</div>
                </div>
                <div class="card">
                    <label>Evolução do foco</label>
                    <div class="v tag" id="m-tend-foco">–</div>
                </div>
            </div>

            <div class="grafico">
                <h3>Acertos por dia (quanto mais alto, melhor)</h3>
                <canvas id="g-acertos"></canvas>
            </div>

            <div class="grafico">
                <h3>Distrações por dia — trocas de aba + cliques fora (quanto mais baixo, melhor)</h3>
                <canvas id="g-foco"></canvas>
            </div>

            <p class="hobbies" id="hobbies"></p>
        </div>

        <div class="grafico container-grafico">
            <h3>Estatísticas de Hobbies dos Usuários</h3>
            <canvas id="meuGraficoKaIA"></canvas>
        </div>

    </main>

    <!-- script.js primeiro: define API_URL e o menu lateral usados abaixo -->
    <script src="script.js"></script>
    <script>
        let gAcertos = null, gFoco = null, gHobbies = null;

        // Eixos claros: os gráficos desta página vivem sobre cards brancos.
        const EIXOS = {
            responsive: true,
            plugins: { legend: { display: false } },
            scales: {
                x: { grid: { color: 'rgba(26,43,76,.08)' }, ticks: { color: '#1a2b4c' } },
                y: { grid: { color: 'rgba(26,43,76,.08)' }, ticks: { color: '#1a2b4c' }, beginAtZero: true },
            },
        };

        const TREND = {
            melhorando: { txt: '↑ Melhorando', cls: 'bom' },
            piorando:   { txt: '↓ Piorando',   cls: 'ruim' },
            estavel:    { txt: '→ Estável',    cls: 'neutro' },
            sem_dados:  { txt: '— Sem dados',  cls: 'neutro' },
        };

        function aplicarTend(id, valor) {
            const info = TREND[valor] || TREND.sem_dados;
            const el = document.getElementById(id);
            el.textContent = info.txt;
            el.className = 'v tag ' + info.cls;
        }

        async function carregar() {
            const email  = document.getElementById('email').value.trim();
            const status = document.getElementById('status');
            const painel = document.getElementById('painel');

            if (!email) { status.textContent = 'Digite o e-mail do aluno.'; return; }
            status.textContent = 'Carregando…';
            painel.style.display = 'none';

            try {
                const r = await fetch(`${API_URL}/responsavel/aluno?email=${encodeURIComponent(email)}`);
                const data = await r.json();

                if (!r.ok) { status.textContent = data.erro || 'Erro ao buscar o aluno.'; return; }
                if (!data.series.length) {
                    status.textContent = 'Aluno encontrado, mas ainda não há dados de estudo registrados.';
                    return;
                }

                status.textContent = data.demo
                    ? '⚠️ Modo demonstração: dados de exemplo (sem conexão com o banco nesta rede).'
                    : '';
                painel.style.display = 'block';

                document.getElementById('m-acertos').textContent = data.resumo.total_acertos;
                document.getElementById('m-dias').textContent    = data.resumo.dias_com_dados;
                document.getElementById('m-seq').textContent     = data.aluno.sequencia_dias_estudo ?? 0;
                aplicarTend('m-tend-acertos', data.resumo.tendencia_acertos);
                aplicarTend('m-tend-foco',    data.resumo.tendencia_foco);

                const hobbies = data.aluno.hobbies || [];
                document.getElementById('hobbies').textContent =
                    hobbies.length ? `Hobbies usados na personalização: ${hobbies.join(', ')}` : '';

                desenhar(
                    data.series.map(s => s.dia),
                    data.series.map(s => s.acertos),
                    data.series.map(s => s.distracao)
                );
            } catch (e) {
                status.textContent = 'Não foi possível conectar ao servidor (a API está rodando em :5000?).';
                console.error(e);
            }
        }

        function desenhar(labels, acertos, distracao) {
            gAcertos?.destroy();
            gAcertos = new Chart(document.getElementById('g-acertos'), {
                type: 'line',
                data: { labels, datasets: [{
                    data: acertos, borderColor: '#57D979', backgroundColor: 'rgba(87,217,121,.15)',
                    fill: true, tension: .3, pointRadius: 4,
                }] },
                options: EIXOS,
            });

            gFoco?.destroy();
            gFoco = new Chart(document.getElementById('g-foco'), {
                type: 'bar',
                data: { labels, datasets: [{
                    data: distracao, backgroundColor: '#e8606b', borderRadius: 6,
                }] },
                options: EIXOS,
            });
        }

        // Gráfico geral: hobbies de todos os usuários (Supabase via API)
        async function carregarGraficoHobbies() {
            try {
                const r = await fetch(`${API_URL}/api/dados-grafico`);
                const dados = await r.json();   // { labels: [...], valores: [...] }
                if (!dados.labels?.length) return;

                if (dados.demo) {
                    const h = document.querySelector('.container-grafico h3');
                    if (h) h.textContent += ' (dados de exemplo)';
                }

                gHobbies?.destroy();
                gHobbies = new Chart(document.getElementById('meuGraficoKaIA'), {
                    type: 'bar',
                    data: {
                        labels: dados.labels,
                        datasets: [{
                            label: 'Quantidade de Escolhas',
                            data: dados.valores,
                            backgroundColor: ['#f3d009', '#2d4ba5', '#57d979', '#c4a186'],
                            borderColor: '#1a2b4c',
                            borderWidth: 1,
                        }]
                    },
                    options: EIXOS,
                });
            } catch (erro) {
                console.error('Erro ao carregar dados para o gráfico:', erro);
            }
        }

        document.getElementById('email').addEventListener('keydown', e => {
            if (e.key === 'Enter') carregar();
        });
        document.addEventListener('DOMContentLoaded', carregarGraficoHobbies);
    </script>

</body>

</html>
