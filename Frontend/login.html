<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login KaIA</title>
</head>
<body>
    <!-- CSS -->
    <link rel="stylesheet" href="style.css">
    
    <!-- ================= LOGIN ================= -->

    <div class="tela-login">
        <div class="caixa-login">
            <h1>Ka<span>IA</span></h1>
            <p>Inicie sua missão de foco.</p>
            <div class="grupo-input">
                <label>Email</label>
                <input 
                    type="email"
                    placeholder="Digite seu email">
            </div>
            <div class="grupo-input">
                <label>Senha</label>
                <input 
                    type="password"
                    placeholder="Digite sua senha"
                >
            </div>

            <a href="hobbies.html" class="botao-login">
                Entrar
            </a>
            <span class="texto-login">
                Ainda não possui conta?
            </span>
            <a href="hobbies.html">
                Criar conta
            </a>
        </div>

    </div>
</body>
</html>
