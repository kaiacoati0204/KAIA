<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KaIA | Meu Coati</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">

    <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

    <script src="./config.js"></script>
    <!-- Proteção de rota: sem login no sessionStorage, volta para o login. -->
    <script>
        const usuario = JSON.parse(sessionStorage.getItem('kaia_usuario') || 'null');
        if (!usuario) window.location.href = 'login.html';
    </script>
</head>

<!-- data-menu: o script.js injeta o botão ☰ e o menu lateral -->
<body data-menu>

    <main class="main-content">
        <header class="content-header">
            <h2>Meu Coati</h2>
            <p>Visualize o modelo 3D do seu mascote.</p>
        </header>

        <model-viewer
            class="visor-3d"
            src="Coati_3d.glb"
            alt="Modelo 3D do Coati, mascote da KaIA"
            auto-rotate
            camera-controls
            shadow-intensity="1">
        </model-viewer>
    </main>

    <script src="script.js"></script>
</body>

</html>
